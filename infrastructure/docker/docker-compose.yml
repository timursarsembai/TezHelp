services:
  postgres:
    image: postgis/postgis:17-3.5
    container_name: tezhelp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tezhelp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tezhelp_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-tezhelp}
    ports:
      - "5432:5432"
    volumes:
      - tezhelp_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: tezhelp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - tezhelp_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: tezhelp-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-tezhelp_dev_access_key}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-tezhelp_dev_secret_key}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - tezhelp_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: tezhelp-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/$${S3_BUCKET_PRIVATE};
      mc anonymous set none local/$${S3_BUCKET_PRIVATE};
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-tezhelp_dev_access_key}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-tezhelp_dev_secret_key}
      S3_BUCKET_PRIVATE: ${S3_BUCKET_PRIVATE:-tezhelp-private-dev}

volumes:
  tezhelp_postgres_data:
  tezhelp_redis_data:
  tezhelp_minio_data:
